server {
    # Option 1: Simple localhost binding (easy)
    listen 81;
    # listen [::1]:81;   # Uncomment if you want IPv6 localhost too

    # Option 2 (better for security): Use Unix socket instead of TCP port
    # listen unix:/var/run/tor/nginx-onion.sock;

    server_name _;  # ← REPLACE with real .onion

    # Root directory where your HTML, CSS, and JS files are located
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (good practice for onion sites)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Enable gzip compression
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Main location - serves files + SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Return 404 for any other requests
    location = /404.html {
        internal;
    }

    # Disable access logging for privacy (optional but recommended on onion)
    access_log off;
    error_log /var/log/nginx/onion-error.log warn;
}