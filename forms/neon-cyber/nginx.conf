server {
    listen 81;   # Internal port inside the Docker container (keep this)

    # For local testing via your IP
    server_name 192.168.68.76 localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;

    # === MAIN CHANGE: Serve everything under /markov-eklypse/ ===
    location ^~ /markov-eklypse/ {
        alias /usr/share/nginx/html/;     # Important: use alias + trailing slash

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # SPA routing - fallback to index.html for any route under the subpath
        try_files $uri $uri/ /markov-eklypse/index.html =404;
    }

    # Optional: Redirect /markov-eklypse (without trailing slash) to with slash
    location = /markov-eklypse {
        return 301 /markov-eklypse/;
    }

    # Deny everything else (optional but cleaner)
    location / {
        return 404;
    }

    access_log off;
    error_log /var/log/nginx/error.log warn;
}